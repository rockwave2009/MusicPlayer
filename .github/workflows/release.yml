name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install PyQt6 mutagen numpy pyobjc-framework-Cocoa pyobjc-framework-Quartz
      
      - name: Download FFmpeg
        run: |
          mkdir -p resources/ffmpeg
          # 下载ffmpeg静态构建
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/ffmpeg-7.0.1.zip"
          unzip ffmpeg.zip -d resources/ffmpeg/
          rm ffmpeg.zip
          # 下载ffplay
          curl -L -o ffplay.zip "https://evermeet.cx/ffmpeg/ffplay-7.0.1.zip"
          unzip ffplay.zip -d resources/ffmpeg/
          rm ffplay.zip
          chmod +x resources/ffmpeg/ffmpeg
          chmod +x resources/ffmpeg/ffplay
      
      - name: Build with PyInstaller
        run: |
          if [[ "${{ matrix.arch }}" == "x86_64" ]]; then
            # 为x86_64创建临时spec文件
            cp music_player.spec music_player_x86.spec
            # 修改spec文件以明确指定x86_64架构
            sed -i '' 's/^# EXE配置 - 只有在图标文件存在时才使用图标$/&\n    target_arch = \"x86_64\"/' music_player_x86.spec
            sed -i '' 's/\x27target_arch\x27: None,/\x27target_arch\x27: target_arch,/' music_player_x86.spec
            pyinstaller music_player_x86.spec
          else
            # ARM64架构，使用默认设置
            pyinstaller music_player.spec
          fi
      
      - name: Create DMG
        run: |
          mkdir -p dmg_source
          cp -r dist/MusicPlayer.app dmg_source/
          hdiutil create -volname "MusicPlayer" -srcfolder dmg_source -ov -format UDZO dist/MusicPlayer-macOS-${{ matrix.arch }}.dmg
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-macOS-${{ matrix.arch }}
          path: |
            dist/MusicPlayer-macOS-${{ matrix.arch }}.dmg
            dist/MusicPlayer.app
          
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install PyQt6 mutagen numpy
      
      - name: Download FFmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/ffmpeg
          # 下载ffmpeg完整包
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "temp_ffmpeg"
          # 复制ffmpeg和ffplay
          Copy-Item "temp_ffmpeg/*/bin/ffmpeg.exe" "resources/ffmpeg/"
          Copy-Item "temp_ffmpeg/*/bin/ffplay.exe" "resources/ffmpeg/"
          Remove-Item -Recurse -Force temp_ffmpeg
          Remove-Item ffmpeg.zip
      
      - name: Build with PyInstaller
        run: pyinstaller music_player.spec
      
      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist/MusicPlayer/* -DestinationPath dist/MusicPlayer-Windows.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-Windows
          path: |
            dist/MusicPlayer-Windows.zip
            dist/MusicPlayer/
            
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: MusicPlayer-macOS-x86_64
          path: artifacts/macos-x86_64
      
      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: MusicPlayer-macOS-arm64
          path: artifacts/macos-arm64
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MusicPlayer-Windows
          path: artifacts/windows
      
      - name: Create universal DMG
        run: |
          # 合并x86_64和arm64版本
          mkdir -p dmg_source
          cp -r artifacts/macos-x86_64/MusicPlayer.app dmg_source/
          mv dmg_source/MusicPlayer.app dmg_source/MusicPlayer-x86_64.app
          cp -r artifacts/macos-arm64/MusicPlayer.app dmg_source/
          mv dmg_source/MusicPlayer.app dmg_source/MusicPlayer-arm64.app
          # 创建通用DMG
          hdiutil create -volname "MusicPlayer" -srcfolder dmg_source -ov -format UDZO artifacts/MusicPlayer-macOS-universal.dmg
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MusicPlayer ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/macos-x86_64/MusicPlayer-macOS-x86_64.dmg
            artifacts/macos-arm64/MusicPlayer-macOS-arm64.dmg
            artifacts/MusicPlayer-macOS-universal.dmg
            artifacts/windows/MusicPlayer-Windows.zip
